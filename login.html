<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Eaglercraft Auth</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        form { display: flex; flex-direction: column; width: 300px; }
        input { margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="message"></p>
    </form>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            console.log('Login attempt initiated');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    msg.textContent = 'Login successful! You can close this tab and return to the game.';
                    msg.style.color = 'green';
                    console.log('Sending AUTH_SUCCESS to parent...');

                    if (window.parent && window.parent.opener) {
                        window.parent.opener.postMessage({ type: 'AUTH_SUCCESS', token: data.session.access_token, username: data.session.username }, '*');
                        console.log('Message sent successfully!');
                    }
                    // Attempt to close, but fall back to a manual close prompt
                    setTimeout(() => {
                        window.close();
                        if (!window.closed) {
                            msg.textContent = 'Login successful! You may now close this tab safely.';
                        }
                    }, 1000);
                } else {

                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login Flow Error:', error.message);
                msg.textContent = 'Error: ' + error.message;
                msg.style.color = 'red';
            }
        };
    </script>
</body>
</html>
