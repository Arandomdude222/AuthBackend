<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile Settings - DoxyClient</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #0f325a 0%, #15203b 40%, #431f47 80%, #68263e 100%);
    background-attachment: fixed;
    color: #ffffff;
}

/* ============ TOP BAR ============ */
.topbar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 32px;
    background-color: rgba(39, 42, 46, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 500;
}

.back-link {
    margin-left: auto;
    font-size: 0.9rem;
    color: #9ca3af;
    text-decoration: none;
}
.back-link:hover { color: #ffffff; }

button {
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
}

.btn-primary {
    background-color: #72a5f7;
    color: #111827;
}
.btn-primary:hover { background-color: #93c5fd; }
.btn-primary:disabled { background-color: #4b5f80; color: #9ca3af; cursor: not-allowed; }

.btn-quiet {
    background: #3a3f45;
    color: white;
}
.btn-quiet:hover { background: #4a5158; }

/* ============ MAIN ============ */
main {
    max-width: 600px;
    margin: 0 auto;
    padding: 48px 24px 80px;
}

.page-title {
    font-size: 1.75rem;
    font-weight: 600;
    margin-bottom: 8px;
}

.page-subtitle {
    font-size: 0.9rem;
    color: #d1d5db;
    margin-bottom: 32px;
}

.card {
    background-color: rgba(39, 42, 46, 0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 26px 28px;
    margin-bottom: 24px;
}

.card-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 4px;
}

.card-desc {
    font-size: 0.85rem;
    color: #9ca3af;
    margin-bottom: 22px;
}

.form-row {
    margin-bottom: 16px;
}

.form-row.split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

label {
    display: block;
    font-size: 0.85rem;
    margin-bottom: 8px;
    color: #d1d5db;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 4px;
    border: 1px solid #4b5563;
    background: transparent;
    color: white;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
}
input:focus { border-color: #60a5fa; }
input::placeholder { color: #6b7280; }

.card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    gap: 16px;
}

.status {
    font-size: 0.85rem;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.15s ease;
}
.status.show { opacity: 1; }
.status.success { color: #4ade80; }
.status.error { color: #f87171; }

footer.page-footer {
    text-align: center;
    font-size: 0.8rem;
    color: #9ca3af;
    padding: 20px 0 40px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        DoxyClient
    </div>
    <a class="back-link" href="/">&larr; Back to game</a>
    <button class="btn-quiet" id="logoutBtn" type="button">Log Out</button>
</div>

<main>
    <h1 class="page-title">Account Settings</h1>
    <p class="page-subtitle">Manage the username and password on your Eaglercraft account.</p>

    <!-- USERNAME CARD -->
    <section class="card">
        <div class="card-title">Username</div>
        <p class="card-desc">This is the name other players see on your friends list and in-game.</p>

        <form id="usernameForm">
            <div class="form-row">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Steve" autocomplete="username">
            </div>
            <div class="card-footer">
                <div class="status" id="usernameStatus"></div>
                <button class="btn-primary" type="submit">Save Username</button>
            </div>
        </form>
    </section>

    <!-- PASSWORD CARD -->
    <section class="card">
        <div class="card-title">Password</div>
        <p class="card-desc">Choose a new password. You'll need your current one to confirm.</p>

        <form id="passwordForm">
            <div class="form-row split">
                <div>
                    <label for="currentPassword">Current Password</label>
                    <input id="currentPassword" type="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div>
                    <label for="newPassword">New Password</label>
                    <input id="newPassword" type="password" placeholder="••••••••" autocomplete="new-password">
                </div>
            </div>
            <div class="card-footer">
                <div class="status" id="passwordStatus"></div>
                <button class="btn-primary" type="submit">Save Password</button>
            </div>
        </form>
    </section>
</main>

<footer class="page-footer">© 2026 DoxyClient</footer>

<script>
const token = localStorage.getItem("eaglercraft_token");

if (!token) {
    location.href = "/login";
}

/* STATUS HELPER (per-card, UI only) */
function showStatus(elId, kind, text) {
    const el = document.getElementById(elId);
    el.classList.remove("success", "error", "show");
    el.textContent = text;
    void el.offsetWidth;
    el.classList.add(kind, "show");
}

function setLoading(form, loading) {
    const btn = form.querySelector("button[type=submit]");
    btn.disabled = loading;
    btn.dataset.label = btn.dataset.label || btn.textContent;
    btn.textContent = loading ? "Saving..." : btn.dataset.label;
}

/* LOAD CURRENT USER */
async function loadMe() {
    try {
        const res = await fetch("/api/me", {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        if (data.username) {
            document.getElementById("username").value = data.username;
        }
    } catch {}
}
loadMe();

/* SAVE USERNAME */
document.getElementById("usernameForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = e.target;
    setLoading(form, true);

    try {
        const newUsername = document.getElementById("username").value;

        const uRes = await fetch("/api/change-username", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ newUsername })
        });

        const uData = await uRes.json();
        if (!uRes.ok) throw new Error(uData.error || "Could not update username");

        if (uData.session?.access_token) {
            localStorage.setItem("eaglercraft_token", uData.session.access_token);
        }

        showStatus("usernameStatus", "success", "Username updated");
    } catch (err) {
        showStatus("usernameStatus", "error", err.message);
    } finally {
        setLoading(form, false);
    }
};

/* SAVE PASSWORD */
document.getElementById("passwordForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = e.target;

    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;

    if (!currentPassword || !newPassword) {
        showStatus("passwordStatus", "error", "Fill in both password fields");
        return;
    }

    setLoading(form, true);

    try {
        const pRes = await fetch("/api/change-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ currentPassword, newPassword })
        });

        const pData = await pRes.json();
        if (!pRes.ok) throw new Error(pData.error || "Password failed");

        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        showStatus("passwordStatus", "success", "Password updated");
    } catch (err) {
        showStatus("passwordStatus", "error", err.message);
    } finally {
        setLoading(form, false);
    }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
    localStorage.removeItem("eaglercraft_token");
    localStorage.removeItem("eaglercraft_username");
    location.href = "/login";
};
</script>

</body>
</html>
