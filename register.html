<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create an account - DoxyClient Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            background-color: #24272a;
            color: #ffffff;
        }
        .left-panel {
            flex: 1;
            background: radial-gradient(circle at 10% 20%, #0f325a 0%, #15203b 40%, #431f47 80%, #68263e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
        }
        .left-panel h1 {
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .left-panel p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }
        .right-panel {
            width: 450px;
            background-color: #272a2e;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }
        .right-content {
            margin-top: auto;
            margin-bottom: auto;
        }
        .top-logo {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2 { 
            font-size: 1.75rem; 
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #d1d5db;
            margin-bottom: 35px;
        }
        .subtitle a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }
        .subtitle a:hover { text-decoration: underline; }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ffffff;
        }
        input { 
            width: 100%;
            padding: 12px; 
            border-radius: 4px; 
            border: 1px solid #4b5563; 
            background-color: transparent;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #60a5fa; }
        
        button { 
            width: 100%;
            background-color: #72a5f7;
            color: #111827;
            border: none;
            padding: 13px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 15px;
        }
        button:hover { background-color: #93c5fd; }
        
        #message { 
            margin-top: 15px; 
            text-align: center; 
            font-size: 0.85rem; 
            min-height: 20px;
        }
        
        .footer {
            margin-top: auto;
            font-size: 0.8rem;
            color: #9ca3af;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .footer a { color: #60a5fa; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .footer span { margin-left: auto; color: #d1d5db; }
        
        @media (max-width: 800px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <h1>DoxyClient Auth</h1>
        <p>Advanced authentication management</p>
    </div>
    <div class="right-panel">
        <div class="top-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            DoxyClient
        </div>
        <div class="right-content">
            <h2>Create an account</h2>
            <div class="subtitle">Already have an account? <a href="/login">Sign in</a></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit">Sign Up</button>
                <p id="message"></p>
            </form>
        </div>
        <div class="footer">
            <a href="#">Terms</a>
            <a href="#">Policy</a>
            <span>© 2026 Eaglercraft, Inc.</span>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (pass !== confirm) {
                msg.textContent = 'Passwords do not match!';
                msg.style.color = '#f87171';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: pass
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = 'Registration successful! Redirecting you back to login...';
                    msg.style.color = '#4ade80';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    msg.textContent = 'Error: ' + data.error;
                    msg.style.color = '#f87171';
                }
            } catch (error) {
                msg.textContent = 'Error: ' + error.message;
                msg.style.color = '#f87171';
            }
        };
    </script>
</body>
</html>
