<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Eaglercraft Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .container:hover { transform: translateY(-5px); }
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 2rem; 
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        form { display: flex; flex-direction: column; gap: 15px; }
        input { 
            width: 100%;
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        button { 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            transform: scale(1.02);
        }
        button:active { transform: scale(0.98); }
        #message { 
            margin-top: 15px; 
            text-align: center; 
            font-size: 0.9rem; 
            min-height: 20px;
            font-weight: 600;
        }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .footer-link a {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-link a:hover { color: #818cf8; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <form id="registerForm">
            <h2>Create Account</h2>
            <input type="text" id="username" placeholder="Username" required autocomplete="off">
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
            <p id="message"></p>
        </form>
        <div class="footer-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (pass !== confirm) {
                msg.textContent = 'Passwords do not match!';
                msg.style.color = '#f87171';
                return;
            }

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: pass
                })
            });
            const data = await res.json();
            if (res.ok) {
                msg.textContent = 'Registration successful! Redirecting you back to login...';
                msg.style.color = '#4ade80';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } else {
                msg.textContent = 'Error: ' + data.error;
                msg.style.color = '#f87171';
            }
        };
    </script>
</body>
</html>
