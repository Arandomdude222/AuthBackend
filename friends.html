<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Friends - DoxyClient</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; background: radial-gradient(circle at 10% 20%, #0f325a 0%, #15203b 40%, #431f47 80%, #68263e 100%); background-attachment: fixed; color: #ffffff; }
    main { max-width: 600px; margin: 0 auto; padding: 48px 24px 80px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; cursor: pointer; background: rgba(39, 42, 46, 0.6); border: none; border-radius: 8px; color: white; }
    .tab-btn.active { background: #72a5f7; color: #111827; }
    
    .tab-content { display: none; background: rgba(39, 42, 46, 0.65); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 26px; }
    .tab-content.active { display: block; }

    input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #4b5563; background: transparent; color: white; margin-bottom: 10px; }
    button { padding: 10px 18px; border-radius: 4px; border: none; background: #72a5f7; cursor: pointer; font-weight: 600; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('friends')">Friends</button>
        <button class="tab-btn" onclick="openTab('search')">Search</button>
        <button class="tab-btn" onclick="openTab('requests')">Requests</button>
    </div>

    <div id="friends" class="tab-content active">
        <div id="friendsList"></div>
    </div>
    <div id="search" class="tab-content">
        <input type="text" id="searchUsername" placeholder="Search by username..." oninput="searchPlayer()">
        <div id="searchResults"></div>
    </div>
    <div id="requests" class="tab-content">
        <div id="friendRequestsList"></div>
    </div>
</main>
<script>
    const token = localStorage.getItem("eaglercraft_token");
    if (!token) location.href = "/login";
    
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    async function api(action, body = {}) {
        const res = await fetch("/api/friends", {
            method: 'POST',
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ action, ...body })
        });
        return res.json();
    }

    async function loadFriends() {
        const friends = await api('get-friends');
        document.getElementById("friendsList").innerHTML = friends.map(f => 
            `<div class="item">${f} <button onclick="removeFriend('${f}')">Remove</button></div>`
        ).join('');
    }

    async function searchPlayer() {
        const username = document.getElementById("searchUsername").value;
        if (!username) return;
        const res = await fetch("/api/friends", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ action: 'search-players', username })
        });
        const resultDiv = document.getElementById("searchResults");
        if (res.ok) {
            const data = await res.json();
            resultDiv.innerHTML = `<div class="item">${data.username} <button onclick="sendRequest('${data.username}')">Add Friend</button></div>`;
        } else {
            resultDiv.innerHTML = `<p>User not found</p>`;
        }
    }

    async function sendRequest(username) {
        await api('send-request', { receiverUsername: username });
        alert("Request sent!");
    }

    async function removeFriend(username) {
        await api('remove-friend', { friendUsername: username });
        loadFriends();
    }

    async function loadRequests() {
        const requests = await api('get-requests');
        document.getElementById("friendRequestsList").innerHTML = requests.map(r => 
            `<div class="item">${r.sender_username} <button onclick="acceptRequest('${r.id}')">Accept</button></div>`
        ).join('');
    }

    async function acceptRequest(id) {
        await api('accept-request', { requestId: id });
        loadRequests();
        loadFriends();
    }

    loadFriends();
    loadRequests();
</script>
</body>
</html>
